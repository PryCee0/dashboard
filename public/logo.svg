<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3B47"/>
      <stop offset="100%" style="stop-color:#B8161F"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Icon: Dark circle with play symbol -->
  <circle cx="30" cy="30" r="27" fill="#0A0A0A" stroke="url(#redGrad)" stroke-width="2"/>
  <polygon points="24,18 24,42 42,30" fill="url(#redGrad)" filter="url(#glow)"/>
  <!-- Gothic wordmark -->
  <text x="68" y="40" font-family="'Cinzel Decorative', serif" font-size="26" font-weight="700" letter-spacing="2">
    <tspan fill="#E41E2B">RED</tspan><tspan fill="white">POT</tspan>
  </text>
  <text x="68" y="54" font-family="'Cinzel', serif" font-size="9" font-weight="400" fill="rgba(255,255,255,0.4)" letter-spacing="6">MEDIA</text>
</svg>
